<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="#0F2550"/>

  <!-- ワインボトル：アウトライン（左） -->
  <!-- Burgundy型の流線シルエット、ストロークのみ -->
  <path
    d="M 155 62 L 177 62 L 177 70
       C 177 70 182 78 183 128
       C 196 142 213 166 214 196
       L 214 390
       C 214 403 204 413 191 413
       L 141 413
       C 128 413 118 403 118 390
       L 118 196
       C 119 166 136 142 149 128
       C 150 78 155 70 155 70 Z"
    fill="none"
    stroke="white"
    stroke-width="14"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- キャップ -->
  <rect x="151" y="52" width="30" height="16" rx="6" fill="white"/>

  <!-- 万年筆：ソリッド白（右・斜め約42度） -->
  <g transform="rotate(-42, 345, 256)">
    <!-- バレル（後端が尖った長い流線形） -->
    <path
      d="M 230 226
         C 230 212 242 205 258 205
         L 420 205
         C 448 205 468 220 468 240
         C 468 260 448 275 420 275
         L 258 275
         C 242 275 230 268 230 254 Z"
      fill="white"
    />
    <!-- グリップ（バレルとニブの接続部） -->
    <rect x="193" y="218" width="40" height="44" rx="8" fill="white"/>
    <!-- グリップリング -->
    <rect x="188" y="216" width="9" height="48" rx="4" fill="white"/>
    <!-- ニブ（万年筆特有の翼形） -->
    <path
      d="M 150 240
         L 193 218
         L 193 262 Z"
      fill="white"
    />
    <!-- ニブの穴 -->
    <circle cx="182" cy="240" r="5" fill="#0F2550"/>
    <!-- ニブのスリット -->
    <line x1="162" y1="240" x2="188" y2="240" stroke="#0F2550" stroke-width="2.5"/>
  </g>

</svg>
